# DVC pipeline — Phase 1: Corpus Building
#
# Env policy: secrets sourced from project .env via uv --env-file;
# never via export KEY := $(shell ...) or command-line KEY=value.
#
# Mirrors Makefile Phase 1a–1f. Run with:
#   dvc repro              (full pipeline)
#   dvc repro discover     (single stage)
#
# NOTE: discover/enrich stages involve API calls and may take hours.
# Do not run casually — use `dvc repro --dry` to preview what would run.

stages:
  # Phase 1a-pre: Parse bibCNRS RIS exports → bibcnrs_works.csv
  # Hand-exported from bib.cnrs.fr (CNRS credentials required); conversion is
  # deterministic so it lives in the pipeline rather than as a pre-placed artifact.
  catalog_bibcnrs:
    cmd: uv run --env-file .env python scripts/harvest/catalog_bibcnrs.py
    deps:
      - scripts/harvest/catalog_bibcnrs.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/exports
    outs:
      - data/catalogs/bibcnrs_works.csv

  # ── Phase 1a: Discovery ──────────────────────────────────
  # Independent per-source stages → catalog_merge.
  # DVC runs independent stages in parallel and skips unchanged ones.

  catalog_istex:
    cmd: uv run --env-file .env python scripts/harvest/catalog_istex.py --api
    deps:
      - scripts/harvest/catalog_istex.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/corpus_collect.yaml
      - data/pool/istex
    outs:
      - data/catalogs/istex_works.csv
      - data/catalogs/istex_refs.csv

  catalog_openalex:
    cmd: uv run --env-file .env python scripts/harvest/catalog_openalex.py --resume
    deps:
      - scripts/harvest/catalog_openalex.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/openalex_queries.yaml
      - config/corpus_collect.yaml
      - data/pool/openalex
    outs:
      - data/catalogs/openalex_works.csv
      - data/catalogs/openalex_citations.csv

  # catalog_s2: disconnected — keyword search on S2 is ineffective
  # (wrong endpoint, no phrase matching, 1000-result cap, 2M noise results).
  # Pool data preserved in data/pool/semanticscholar/ for future
  # citation-graph-based harvest. See ticket for redesign.

  catalog_grey:
    cmd: uv run --env-file .env python scripts/harvest/catalog_grey.py
    deps:
      - scripts/harvest/catalog_grey.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/grey_sources.yaml
      - config/corpus_collect.yaml
    outs:
      - data/catalogs/grey_works.csv

  catalog_teaching:
    cmd: >-
      uv run --env-file .env python scripts/harvest/build_teaching_yaml.py &&
      uv run --env-file .env python scripts/harvest/build_teaching_canon.py
    deps:
      - scripts/harvest/build_teaching_yaml.py
      - scripts/harvest/build_teaching_canon.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/syllabi
    outs:
      - data/catalogs/teaching_works.csv

  # Merge all per-source CSVs → unified_works.csv
  catalog_merge:
    cmd: uv run --env-file .env python scripts/harvest/catalog_merge.py
    deps:
      - scripts/harvest/catalog_merge.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/bibcnrs_works.csv
      - data/catalogs/istex_works.csv
      - data/catalogs/openalex_works.csv
      - data/catalogs/grey_works.csv
      - data/catalogs/teaching_works.csv
      # Hand-curated input (pre-placed, not produced by pipeline)
      - data/catalogs/scispace_works.csv
    outs:
      - data/catalogs/unified_works.csv

  # ── Phase 1b: Enrichment pipeline ──────────────────────────
  # Split into independent DVC stages so each step is cached separately.
  # A failure in a late step (e.g. embeddings) won't force re-running
  # earlier steps (e.g. citations) on retry.

  # Phase 1b.1: Enrichment — each script updates its own cache independently.
  # A join stage assembles enriched_works.csv from all caches. See #428.
  # Caches live in enrich_cache/ (persistent, append-only, not DVC outputs).
  # Each stage writes a .stamp file as its DVC output so the DAG captures
  # ordering: join_enrichments depends on all stamps, ensuring caches are
  # populated before the join runs.
  #
  # Design trade-off: enrich_language runs on unified_works.csv (before abstract
  # enrichment), so language detection may use title-only text for records whose
  # abstracts are filled later by enrich_abstracts. The cache persists across
  # runs, so a second `make corpus-enrich` after abstracts are filled will
  # re-detect language with the full text. Accepted for stage independence.

  enrich_dois:
    cmd: >-
      uv run --env-file .env python scripts/enrich_dois.py --works-input data/catalogs/unified_works.csv
      --output data/catalogs/enrich_cache/.dois.stamp
    deps:
      - scripts/enrich_dois.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_text.py
      - data/catalogs/unified_works.csv
    outs:
      - data/catalogs/enrich_cache/.dois.stamp:
          cache: false

  enrich_abstracts:
    cmd: >-
      uv run --env-file .env python scripts/harvest/enrich_abstracts.py --works-input data/catalogs/unified_works.csv
      --output data/catalogs/enrich_cache/.abstracts.stamp
    deps:
      - scripts/harvest/enrich_abstracts.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_text.py
      - scripts/pipeline_progress.py
      - data/catalogs/unified_works.csv
    outs:
      - data/catalogs/enrich_cache/.abstracts.stamp:
          cache: false

  enrich_language:
    cmd: >-
      uv run --env-file .env python scripts/harvest/enrich_language.py --works-input data/catalogs/unified_works.csv
      --output data/catalogs/enrich_cache/.language.stamp
    deps:
      - scripts/harvest/enrich_language.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_text.py
      - data/catalogs/unified_works.csv
    outs:
      - data/catalogs/enrich_cache/.language.stamp:
          cache: false

  summarize_abstracts:
    cmd: >-
      uv run --env-file .env python scripts/summarize_abstracts.py --works-input data/catalogs/unified_works.csv &&
      date -Iseconds > data/catalogs/enrich_cache/.summaries.stamp
    deps:
      - scripts/summarize_abstracts.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_text.py
      - data/catalogs/unified_works.csv
    outs:
      - data/catalogs/enrich_cache/.summaries.stamp:
          cache: false

  # NOTE: join_enrichments has no DVC deps on the enrichment stages above.
  # This is intentional — caches are persistent (not DVC outputs), so
  # `dvc repro join_enrichments` reads whatever caches exist on disk.
  # Use `make corpus-enrich` to run all enrichment stages first.
  join_enrichments:
    cmd: uv run --env-file .env python scripts/harvest/enrich_join.py
    deps:
      - scripts/harvest/enrich_join.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_text.py
      - data/catalogs/unified_works.csv
      - data/catalogs/enrich_cache/.dois.stamp
      - data/catalogs/enrich_cache/.abstracts.stamp
      - data/catalogs/enrich_cache/.language.stamp
      - data/catalogs/enrich_cache/.summaries.stamp
    outs:
      - data/catalogs/enriched_works.csv

  # Phase 1b.3: Build citation caches (Crossref + OpenAlex in parallel, then GROBID parse)
  # Crossref and OpenAlex write to enrich_cache/ (persistent, append-only).
  # GROBID parses unstructured Crossref refs into ref_parsed.csv.
  # citations.csv is produced downstream by the ref_match stage (#539).
  enrich_citations:
    cmd: >-
      uv run --env-file .env python scripts/harvest/enrich_citations_batch.py --works-input data/catalogs/enriched_works.csv & p1=$!;
      uv run --env-file .env python scripts/harvest/enrich_citations_openalex.py --works-input data/catalogs/enriched_works.csv & p2=$!;
      wait $p1 && wait $p2 &&
      uv run --env-file .env python scripts/harvest/corpus_parse_citations_grobid.py
    deps:
      - scripts/harvest/enrich_citations_batch.py
      - scripts/harvest/enrich_citations_openalex.py
      - scripts/harvest/corpus_parse_citations_grobid.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/enriched_works.csv

  # Phase 1b.4: Citation QC — verify against Crossref ground truth
  qa_citations:
    cmd: uv run --env-file .env python scripts/qa/qa_citations.py --output content/tables/qa_citations_report.json --works-input data/catalogs/enriched_works.csv
    deps:
      - scripts/qa/qa_citations.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/enriched_works.csv
      - data/catalogs/citations.csv

  # Phase 1b.5: Sentence embeddings (encoding only — no UMAP/clustering)
  # Requires uv sync --group corpus --extra cpu (or --extra cu130 on GPU)
  enrich_embeddings:
    cmd: uv run --env-file .env python scripts/harvest/enrich_embeddings.py --works-input data/catalogs/enriched_works.csv --output data/catalogs/embeddings.npz
    deps:
      - scripts/harvest/enrich_embeddings.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/enriched_works.csv
    outs:
      - data/catalogs/embeddings.npz

  # Phase 1c: Extend → extended_works.csv
  # Adds diagnostic flags and protection columns; no rows removed.
  # corpus_filter.py loads config/corpus_filter.yaml via filter_flags.py.
  extend:
    cmd: >-
      uv run --env-file .env python scripts/harvest/corpus_filter.py --extend --works-input data/catalogs/enriched_works.csv --works-output data/catalogs/extended_works.csv
    deps:
      - scripts/harvest/corpus_filter.py
      - scripts/filter_flags.py
      - scripts/filter_flags_llm.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/corpus_filter.yaml
      - data/catalogs/enriched_works.csv
    outs:
      - data/catalogs/extended_works.csv

  # Phase 1d: Filter → refined_works.csv + corpus_audit.csv
  # Applies keep/remove policy based on flags set in extend stage.
  # Also loads config/corpus_filter.yaml for retention policy parameters.
  filter:
    cmd: >-
      uv run --env-file .env python scripts/harvest/corpus_filter.py --filter --works-input data/catalogs/extended_works.csv --works-output data/catalogs/refined_works.csv
    deps:
      - scripts/harvest/corpus_filter.py
      - scripts/filter_flags.py
      - scripts/filter_flags_llm.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - config/corpus_filter.yaml
      - config/v1_identifiers.txt.gz
      - data/catalogs/extended_works.csv
    outs:
      - data/catalogs/refined_works.csv
      - data/catalogs/corpus_audit.csv

  # Phase 1d.1: Match parsed citation refs to corpus works (#539)
  # Fuzzy-matches GROBID-parsed refs (from enrich_cache/ref_parsed.csv) against
  # refined_works.csv to discover ref_doi for refs that cite corpus works.
  # Writes enrich_cache/ref_matches.csv, then merges all citation caches
  # (crossref + openalex + grobid + ref_matches) into citations.csv.
  ref_match:
    cmd: uv run --env-file .env python scripts/harvest/corpus_ref_match.py && uv run --env-file .env python scripts/corpus_merge_citations.py
    deps:
      - scripts/harvest/corpus_ref_match.py
      - scripts/corpus_merge_citations.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_text.py
      - data/catalogs/refined_works.csv
    outs:
      - data/catalogs/citations.csv

  # Phase 1e: Align → refined_embeddings.npz + refined_citations.csv
  # Produces row-aligned Phase 2 contract artifacts:
  #   refined_embeddings.npz[vectors][i] ↔ refined_works.csv row i
  #   refined_citations.csv edges restricted to refined DOIs
  align:
    cmd: uv run --env-file .env python scripts/harvest/corpus_align.py
    deps:
      - scripts/harvest/corpus_align.py
      - scripts/utils.py
      - scripts/pipeline_io.py
      - scripts/pipeline_loaders.py
      - scripts/pipeline_progress.py
      - scripts/pipeline_text.py
      - data/catalogs/refined_works.csv
      - data/catalogs/embeddings.npz
      - data/catalogs/citations.csv
    outs:
      - data/catalogs/refined_embeddings.npz
      - data/catalogs/refined_citations.csv


