# OECD DAC key-documents sub-list — corpus v2 curated layer (ticket 0288).
#
# Inclusion rule (author-validated 2026-07-22, class level): official documents
# produced by or addressed to the OECD DAC that define, account for, or govern
# climate finance. NON-DOI FOUNDING DOCUMENTS ONLY: the refined corpus already
# holds 310 OECD works via their 10.1787 DOIs through OpenAlex (flagship
# accounting series, blended-finance guidance, Oxfam counter-literature), so a
# wholesale OECD harvest was rejected (ticket 0288, log 2026-07-20). The gaps
# are the founding documents outside the DOI system: the DAC Statistical
# Reporting Directives establishing and revising the Rio markers (1998
# onwards), pre-DOI-era Development Co-operation Reports, and early
# DAC/WP-STAT/ENVIRONET documents from the OECD OLIS/One archive.
#
# Document classes (doc_class):
#   statistical_directive           DAC Statistical Reporting Directives (Rio markers)
#   development_cooperation_report  pre-DOI Development Co-operation Reports
#   dac_document                    early DAC/WP-STAT/ENVIRONET documents
#
# Identifier: the OECD document symbol (e.g. DCD/DAC(2016)3/FINAL) when known;
# stable constructed ids otherwise ("OLIS symbol to identify at harvest" in
# provenance). No entry may carry a `doi:` key — the harvester rejects seeds
# with DOIs so an OECD work already present via its 10.1787 DOI cannot be
# re-added through this layer (dedup by design, see
# tests/test_catalog_keydocs.py).
#
# URL note: one.oecd.org serves documents at
# https://one.oecd.org/document/<symbol>/en/pdf but returns 403 to
# non-browser clients (checked 2026-07-22). The harvester records the URL,
# tolerates the failure, and accepts pre-placed PDFs in the pool directory
# (manual bulk export path anticipated by ticket 0288).

documents:
  # ── DAC Statistical Reporting Directives (Rio markers) ───────────────
  - symbol: "OECD/DAC/SRD/1998"
    title: "DAC Statistical Reporting Directives: 1998 revision introducing the Rio markers"
    short_title: "Rio markers established (WP-STAT, 1998)"
    year: 1998
    body: "OECD DAC Working Party on Statistics"
    doc_class: statistical_directive
    language: en
    url: ""
    provenance: "Founding document of Rio-marker climate reporting; zero source directives in corpus v1 (ticket 0288). OLIS symbol to identify at harvest."
  - symbol: "DCD/DAC(2000)10"
    title: "DAC Statistical Reporting Directives (2000)"
    short_title: "Statistical Reporting Directives, 2000 edition"
    year: 2000
    body: "OECD Development Assistance Committee"
    doc_class: statistical_directive
    language: en
    url: "https://one.oecd.org/document/DCD/DAC(2000)10/en/pdf"
    provenance: "First consolidated directives with Rio markers in the CRS. Symbol to confirm at harvest."
  - symbol: "DCD/DAC(2007)34"
    title: "DAC Statistical Reporting Directives (2007)"
    short_title: "Statistical Reporting Directives, 2007 edition"
    year: 2007
    body: "OECD Development Assistance Committee"
    doc_class: statistical_directive
    language: en
    url: "https://one.oecd.org/document/DCD/DAC(2007)34/en/pdf"
    provenance: "Directives in force when the mitigation marker became reportable to the CRS. Symbol to confirm at harvest."
  - symbol: "DCD/DAC(2010)40/REV1"
    title: "DAC Statistical Reporting Directives (2010, revision 1)"
    short_title: "Statistical Reporting Directives, 2010 revision (adaptation marker added)"
    year: 2010
    body: "OECD Development Assistance Committee"
    doc_class: statistical_directive
    language: en
    url: "https://one.oecd.org/document/DCD/DAC(2010)40/REV1/en/pdf"
    provenance: "Adaptation Rio marker introduced (2010 flows). Symbol to confirm at harvest."
  - symbol: "DCD/DAC(2013)15/FINAL"
    title: "Converged Statistical Reporting Directives for the Creditor Reporting System (CRS) and the Annual DAC Questionnaire"
    short_title: "Converged Statistical Reporting Directives (2013)"
    year: 2013
    body: "OECD Development Assistance Committee"
    doc_class: statistical_directive
    language: en
    url: "https://one.oecd.org/document/DCD/DAC(2013)15/FINAL/en/pdf"
