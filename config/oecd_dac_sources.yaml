    body: "OECD Development Assistance Committee"
    doc_class: statistical_directive
    language: en
    url: "https://one.oecd.org/document/DCD/DAC(2016)3/FINAL/en/pdf"
    provenance: "Reference edition for Rio-marker definitions in the USD 100bn accounting dispute. URL pattern checked 2026-07-22 (403 to robots — manual export path)."
  - symbol: "DCD/DAC/STAT(2018)9/FINAL"
    title: "Converged Statistical Reporting Directives for the Creditor Reporting System (CRS) and the Annual DAC Questionnaire (2018)"
