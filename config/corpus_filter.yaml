noise_title:
  # Tech/crypto
  - blockchain
  - cryptocurrency
  - bitcoin
  - ethereum
  - nft
  - deep learning
  - neural network
  - gpt
  - large language model
  - llm
  - metaverse
  - virtual reality
  - chatgpt
  - generative ai
  # Pure ecology / biophysical (no finance angle)
  - species diversity
  - species richness
  - species composition
  - aboveground biomass
  - allometric
  - wood density
  - tree species
  - plant species
  - forest inventory
  - forest ecology
  - vegetation index
  - habitat preference
  - habitat loss

# Exact-match titles: journal front/back matter, not research papers
noise_title_exact:
  - index
  - references
  - issue information
  - abbreviations
  - full issue
  - bibliography
  - contributors
  - notes
  - front matter
  - contents
  - acronyms
  - preliminary material
  - prelims
  - glossary
  - webwatch
  - news
  - weather news
  - titelei/inhaltsverzeichnis

