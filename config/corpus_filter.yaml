  - climate
  - carbon market
  - carbon tax
  - carbon price
  - carbon credit
  - carbon trading
  - carbon offset
  - emission
  - energy
  - green bond
  - green finance
  - adaptation
  - mitigation
  - renewable
  - finance
  - fund
  - investment
  - aid
  - cdm
  - kyoto
  - gef
  - paris agreement
  - unfccc
  - cop
  - redd
  - jetp
  # French
  - climat
  - financ
  - carbone
  - durable
  # German
  - klima
  - finanz
  # Spanish/Portuguese
  - "climátic"
  # Chinese
  - "\u6C14\u5019"
  - "\u91D1\u878D"
  - "\u78B3"
  - "\u7EFF\u8272"
  # Japanese
  - "\u30B0\u30EA\u30FC\u30F3"
  - "\u30D5\u30A1\u30A4\u30CA\u30F3\u30B9"

concept_groups:
  climate: [climate, emission, greenhouse, warming, mitigation, adaptation, ghg, co2, ipcc]
  finance: [finance, fund, investment, cost, market, aid, grant, loan, subsidy, fiscal, monetary, budget, bond, bank, insurance, payment, pes, offset, trading, price, tax, credit]
  policy: [policy, governance, regulation, treaty, agreement, unfccc, cop, kyoto, paris, redd, cdm, gef, oda, development, developing, country, nation, transfer, poverty]
  energy: [energy, renewable, electricity, solar, wind, power, grid, fossil, fuel, transition, decarbonization]
# Ecology/biophysical terms no longer count as a concept group.
# Papers must hit climate/energy + finance/policy to pass, not just climate + ecology.
min_concept_groups: 2

# Works before this year are removed regardless of protection.
# Climate finance as a concept postdates 1990; 1960 allows foundational
# economics works but excludes noise (e.g., Securities Exchange Act 1934).
year_floor: 1960

citation_isolation:
  max_year: 2019

semantic_outlier:
  sigma: 2

llm_relevance:
  backend: reranker
  # Reranker backend (local cross-encoder, no API needed)
  reranker_model: BAAI/bge-reranker-v2-m3
  reranker_query: >
    climate policy and financial mechanisms
  reranker_threshold: 0.002
  reranker_batch_size: 64
  # LLM backends (fallback)
  openrouter_model: google/gemini-2.5-flash
  ollama_model: "qwen2.5:32b"
  ollama_url: "http://localhost:11434"
  batch_size: 15
  ollama_batch_size: 5
  max_consecutive_errors: 3
  title_max_chars: 150
  abstract_max_chars: 250
  prompt_template: |
    For each paper below, determine if it is about climate finance,
    climate policy economics, carbon markets, green investment,
    or environmental finance for developing countries.
    Answer with ONLY a JSON object mapping paper numbers to true/false.
    Example: {"1": true, "2": false, "3": true}

protection:
  min_cited_by: 50
  min_source_count: 2
  # Curated key-documents layer (ticket 0288): protected regardless of
  # citations/source count — official documents have neither.
  curated_sources:
    - unfccc
    - oecd

audit:
  model: google/gemma-2-27b-it
  sample_size: 50
  prompt_template: |
    Is this academic paper about climate finance, climate policy, carbon markets,
    environmental economics, or green investment? Answer YES or NO with one
    sentence justification.

    Title: {title}
    Abstract: {abstract}
