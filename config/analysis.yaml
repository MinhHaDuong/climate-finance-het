# Phase 2 analysis parameters
# These control the analysis & figure pipeline (scripts/compute_*, scripts/plot_*)
# Phase 1 (corpus building) parameters live in corpus_filter.yaml and friends.

periodization:
  year_min: 1990
  year_max: 2024
  breaks: [2007, 2015]  # Year boundaries between acts (I→II, II→III)

clustering:
  k: 6                  # Number of KMeans clusters
  cite_threshold: 50    # Minimum cited_by_count for "core" papers

# ── Cluster-free divergence panel (ticket 0026) ──────────────────────────
# compute_divergence.py --method X reads this section via load_analysis_config().
#
# Output contract (one CSV per method, validated by DivergenceSchema):
#   year(int), channel(str), window(str), hyperparams(str?), value(float?)
# Channel is one of: semantic, lexical, citation.
# Window is "2","3","4" or "cumulative" for citation graph methods.

divergence:
  random_seed: 42
  backend: auto        # auto (GPU if available), cpu, cuda
  windows: [2, 3, 4]
  gap: 1               # years excluded around split: before=[t-w, t-gap], after=[t+gap, t+w]
  min_papers: 30          # per window minimum (override with 5 for smoke)
  min_papers_smoke: 5     # auto-detected when n_works < 200
  max_subsample: 2000     # cap per side for O(n²) methods
  equal_n: true            # subsample both windows to min(n_before, n_after)
  pelt_penalties: [1, 3, 5]
  pelt_model: rbf
  pelt_min_size: 2

  equal_n_r: 20          # subsampling replicates for Z-score ribbon (ticket 0084)
  subsample_trim: 2      # replicates to drop from each tail (10th/90th pctile for R=20)

  permutation:
    n_perm: 500
    z_threshold: 2.0    # consumed by compute_transition_zones.py (ticket 0055b)

  bootstrap:
    k: 200               # replicates for estimation CIs (ticket 0047, opt-in)
    citation_subsample_fraction: 0.8   # graph methods use subsampling-without-replacement
                                       # at this fraction (Politis & Romano), not nonparametric
                                       # bootstrap — duplicating nodes is ill-defined for
                                       # spectral / community statistics. Ticket 0069.

  c2st:
    pca_dim: 32
    cv_folds: 5
    class_weight: balanced
    min_papers: 50    # n >= 5 * cv_folds * min_class_size for reliable AUC

  semantic:
    S1_MMD:
      bandwidth_multipliers: [0.5, 1.0, 2.0]   # × median heuristic
    S2_energy: {}                                # no hyperparams
    S3_sliced_wasserstein:
      n_projections: [100, 500, 1000]
    S4_frechet:
      max_dim: 256                               # PCA reduce before Fréchet (covariance stability + speed)
      min_papers: 300  # n > PCA reduced dim (max_dim=256) for valid covariance

  lexical:
    tfidf_max_features: 5000
    tfidf_min_df: 3
    low_n_threshold: 50      # warn when n_min < this in lexical window pairs
    L1_js: {}                                    # uses shared windows
    L2_novelty:
      windows: [3, 5]                            # past/future window
    L3_bursts:
      top_n_terms: 100
      z_threshold: 2.0

  citation:
    G1_pagerank:
      damping: 0.85
      n_bins: 20                                   # histogram bins for JS divergence on PR distributions
    G2_spectral: {}
    G3_coupling_age: {}
    G4_cross_tradition:
      n_communities: 2                           # spectral bisection
    G5_pref_attachment: {}
    G6_entropy: {}
    G7_disruption: {}
    G8_betweenness:
      max_nodes: 500                             # subsample for tractability
    G9_community:
      resolution: 1.0

# ── Companion paper figures (ticket 0058) ────────────────────────────────
# Figure geometry, colours, and thresholds for the four canonical figures
# rendered by scripts/plot_companion_*.py.  Isolated here so plotting
# choices can evolve without touching the compute layer.
companion:
  random_seed: 42
  lead_window: 3              # preferred half-width for Figure 1 / Figure 2
  year_min: 1998
  year_max: 2021
  z_threshold: 2.0            # significance threshold for Z-score layers
  auc_chance: 0.5             # chance level for C2ST AUC reference
  auc_scale: 20.0             # (AUC - 0.5) * auc_scale yields comparable signal
  validated_zone_min_methods: 2
  methods:                    # method_id: display label (used in heatmap rows)
    S2_energy: "S2 Energy"
    L1: "L1 JS"
    G9_community: "G9 Community"
    G2_spectral: "G2 Spectral"
    C2ST_embedding: "C2ST emb"
    C2ST_lexical: "C2ST lex"
  colors:
    z_cmap: "RdBu_r"          # diverging colormap for Z-score heatmap
    zone_edge: "#222222"
    series:
      S2_energy: "#1f77b4"
      L1: "#ff7f0e"
      G9_community: "#2ca02c"
      G2_spectral: "#9467bd"
      C2ST_embedding: "#d62728"
      C2ST_lexical: "#8c564b"
  top_terms: 10               # Figure 3: bars per zone
  stub_figure_todo: "t0064"   # ticket id annotated on stub fallbacks

zoo:
  method_titles:              # Panel titles for 18-method zoo result figures
    S1_MMD: "S1 Maximum Mean Discrepancy"
    S2_energy: "S2 Energy Distance"
    S3_sliced_wasserstein: "S3 Sliced Wasserstein"
    S4_frechet: "S4 Fréchet Distance"
    L1: "L1 JS Divergence"
    L2: "L2 Novelty-Transience Ratio"
    L3: "L3 Term Bursts"
    G1_pagerank: "G1 PageRank"
    G2_spectral: "G2 Spectral Gap"
    G3_coupling_age: "G3 Coupling Age"
    G4_cross_tradition: "G4 Cross-Tradition"
    G5_pref_attachment: "G5 Preferential Attachment"
    G6_entropy: "G6 Entropy"
    G7_disruption: "G7 Disruption Index"
    G8_betweenness: "G8 Betweenness"
    G9_community: "G9 Community JS"
    C2ST_embedding: "C2ST Embedding"
    C2ST_lexical: "C2ST Lexical"

# ── Sensitivity grid (ticket 0083) ──────────────────────────────────────
# compute_sensitivity_grid.py reads this block to run the 4×4×5 sweep.
sensitivity:
  windows: [1, 3, 5, 7]
  gaps: [0, 1, 3, 5]
  dims: [64, 128, 256, 512, 1024]
  equal_n_r: 3         # R=3 median-of-three equal-n subsample replicates
  method: S2_energy

# ── Pre-2007 tradition-separation null model (ticket 0182) ───────────────
# compute_null_separation.py degree-preserving-rewiring null for the
# separation of the three pre-2007 intellectual traditions. The graph-
# construction parameters (cutoff_year, top_n, min_cocit) and the Louvain
# partition seed are imported from plot_fig_traditions so the null tests
# the same seed-sets as the published figure (@fig-traditions); only the
# permutation RNG seed and replicate count are set here.
#
# Two labellings of the same graph are tested (a `labelling` column in the
# output CSV distinguishes them):
#   louvain_anchored  — seed-sets from the Louvain communities the figure
#                       anchors by author name. Optimises modularity by
#                       construction, so it overstates the manuscript claim.
#   a_priori_anchors  — seed-sets fixed a priori from the intellectual-history
#                       record, with NO community detection anywhere in the
#                       labelling path.
#
# anchor_authors / anchor_works define the a-priori membership. They are drawn
# STRICTLY from the "Key references" of @tbl-traditions in content/manuscript.qmd
# §1 — nothing from the graph-tuned figure anchors. Authors are first-author
# surname substrings; works are normalised DOIs. A DOI match wins over an author
# match; an author matching two traditions is ambiguous and dropped.
#
# Michaelowa straddles two traditions (@michaelowa2007 development aid,
# @michaelowa2019 burden-sharing / carbon markets), so the surname is kept out
# of every author bucket and the two papers are placed by DOI instead.
# Homonym caveat: short surnames (e.g. "stern") can match unrelated first
# authors; not blocking at the top-250 scale but noted.
pre2007_separation:
  random_seed: 42      # permutation RNG for degree-preserving rewiring
  n_perm: 1000         # rewired null replicates
  anchor_authors:
    env_econ:       [ayres, kneese, nordhaus, manne, richels, stern, weitzman]
    development:    [desrosieres]
    burden_sharing: [negishi, stadelmann]
  anchor_works:
    development:    [10.1007/s10584-007-9270-3]  # michaelowa2007
    burden_sharing: [10.1002/wcc.613]            # michaelowa2019
