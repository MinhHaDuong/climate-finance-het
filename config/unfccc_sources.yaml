# UNFCCC key-documents sub-list — corpus v2 curated layer (ticket 0288).
#
# Inclusion rule (author-validated 2026-07-22, class level): official documents
# produced by or addressed to the COP that define, account for, or govern
# climate finance — including party/bloc submissions — plus the negotiation
# record around those decisions (session summaries such as the IISD Earth
# Negotiations Bulletin and statements delivered at COPs).
#
# Document classes (doc_class):
#   decision            COP/CMP/CMA decision addenda bearing on finance
#   biennial_assessment SCF Biennial Assessment series (defines CF accounting)
#   fund_report         GCF/GEF/Adaptation Fund reports to COP/CMP
#   inc                 pre-1995 INC negotiation documents
#   submission          party/negotiating-bloc submissions
#   negotiation_record  ENB-type session summaries, statements at COPs
#
# Identifier: the UN document symbol (source_id downstream). Entries without a
# native symbol (ENB, speeches) use a stable constructed id.
# No entry may carry a `doi:` key — DOI'd works enter via OpenAlex; the
# harvester rejects seeds with DOIs (dedup by design, see
# tests/test_catalog_keydocs.py).
#
# `url` points at the PDF when known. Fetch-validated URLs are marked
# "URL spot-verified" in provenance; "URL follows verified pattern" entries
# use the unfccc.int /resource/docs layout confirmed on the spot-verified
# ones; "resolve URL at harvest" entries are completed by the enumeration
# child ticket. This list is a curated starter set — the document-level
# enumeration within the validated classes is completed at harvest
# (see ticket 0288 and its enumeration child ticket).

