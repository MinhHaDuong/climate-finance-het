# AI tells — wordlists for the prose review auditor
# Used by /review-pr-prose, not loaded into every conversation.

blacklisted_words:
  - delve
  - nuanced
  - multifaceted
  - pivotal
  - crucial
  - intricate
  - comprehensive
  - meticulous
  - vibrant
  - arguably
  - showcasing
  - underscores
  - foster
  - tapestry
  - load-bearing

# These words are OK in specific contexts (annotated).
conditional_words:
  - word: robust
    ok_when: "statistical sense (robust standard errors, robust estimation)"
  - word: landscape
    ok_when: "proper noun (CPI *Global Landscape of Climate Finance*)"

blacklisted_phrases:
  - "it is important to note"
  - "in the realm of"
  - "stands as a testament to"
  - "plays a vital role"
  - "the landscape of"
  - "navigating the complexities"
  - "the interplay between"
  - "sheds light on"
  - "a growing body of literature"
  - "offers a lens through which"
  - "it is worth noting"
  - "cannot be overstated"
  # Formal-academic hedges (ticket 0243 D3: restrained register, plain verbs,
  # one hedge at a time — these stack a hedge onto a hedge or dress a claim in
  # passive throat-clearing instead of stating it).
  - "it is thus possible that"
  - "it could be argued that"
  - "it may be suggested that"
  - "it is not unreasonable to"
  - "would seem to suggest"
  - "may be said to"
  - "the reading proposed here"
  - "seemed useful to us"
  # Generation scaffolding (ticket 0243 D1: the final text carries no
  # meta-commentary about the editing/generation process itself — the model
  # writing a pass is neither "I" nor "we" in the manuscript). Deliberately
  # narrow: broader candidates like "this section shows/demonstrates" were
  # tried and dropped — they collide with legitimate academic signposting
  # (manuscript.qmd l.94 already uses "This section shows why...").
  - "as requested"
  - "as instructed"
  - "note to the reviewer"
  - "note for the reviewer"
  - "in this revised version"
  - "as mentioned earlier"
  - "as mentioned above"

density_limits:
  contrast_farming:
    pattern: '"not X, but Y" constructions'
    max_per_document: 3
    note: "each must be genuinely contrastive"
  em_dashes:
    max_per_paragraph: 2
  sentence_initial_connectors:
    words: ["Moreover", "Furthermore", "Additionally"]
    max_per_section: 2

patterns_to_flag:
  - "compulsive tricolons — not every list needs exactly three items"
  - "uniform sentence length — vary between short and long"
  - "excessive hedging — perhaps, it might be argued that, to some extent"
  - "over-explanation — In other words, That is to say"
